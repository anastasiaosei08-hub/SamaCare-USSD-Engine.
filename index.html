<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamaCare Live Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="p-4 md:p-8 min-h-screen bg-[#FAF6F0] flex flex-col justify-between">

    <header class="max-w-6xl mx-auto w-full text-center mb-6">
        <h1 class="text-2xl font-bold text-[#6B1D2F] mb-1">SamaCare Live Engine</h1>
        <p class="text-xs text-green-600 font-semibold flex items-center justify-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Ultra-Stable JSON Cloud Link Active
        </p>
    </header>

    <main class="max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-start my-auto">
        
        <div class="flex justify-center items-center">
            <div class="w-72 bg-[#111111] text-[#FAF6F0] rounded-[40px] p-6 shadow-2xl border-[6px] border-gray-800 flex flex-col justify-between min-h-[510px]">
                <div class="text-[10px] opacity-75 mb-4 flex justify-between font-mono">
                    <span>MTN • GH • 2G</span>
                    <span id="phone-time">07:14 AM</span>
                </div>
                <div class="flex-grow flex flex-col justify-start">
                    <div class="bg-black border border-gray-800 text-gray-100 rounded-2xl p-4 font-mono text-[11px] shadow-inner mb-4 min-h-[220px] flex flex-col justify-between">
                        <div id="screen-text" class="whitespace-pre-line leading-relaxed">Loading stable sync...</div>
                    </div>
                    <div id="action-container" class="grid grid-cols-1 gap-2"></div>
                </div>
                <button onclick="triggerReset()" class="text-[11px] text-red-400 hover:text-red-300 mt-4 font-semibold font-mono">Reset Simulation (*929#)</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 w-full max-w-md mx-auto">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                <div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Clinician Triage View</span>
                    <h2 class="text-xl font-bold text-gray-800">Live Case Tracking</h2>
                </div>
                <span id="dash-status" class="bg-green-50 text-green-600 text-xs font-bold px-2.5 py-1 rounded-full animate-pulse">● LIVE</span>
            </div>
            <div class="py-4 space-y-2 text-xs border-b border-gray-100">
                <div class="flex justify-between"><span class="text-gray-400">Phone</span><span class="font-semibold text-gray-700">+233 50 ••• 5710</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Language</span><span id="dash-lang" class="font-semibold text-gray-700">-</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Current Step</span><span id="dash-step" class="font-semibold text-gray-700">-</span></div>
            </div>
            <div class="py-4 border-b border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-2">Triage Assessment</span>
                <div id="triage-box" class="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 italic">No input yet...</div>
            </div>
            <div id="dashboard-actions" class="grid grid-cols-2 gap-3 pt-4 hidden">
                <button onclick="alert('Simulating direct call loop to patient...')" class="bg-red-600 text-white font-bold text-xs py-2.5 rounded-xl">Call Now</button>
                <button onclick="triggerEscalation()" class="border border-gray-200 font-bold text-xs py-2.5 rounded-xl bg-amber-50 text-amber-700">Escalate Case</button>
            </div>
            <div id="outcome-panel" class="pt-4 hidden border-t border-gray-100 mt-4">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-2">Resolve Case</span>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="markOutcome('Admitted')" class="border p-2 rounded-xl text-gray-700 hover:bg-gray-50">Admitted</button>
                    <button onclick="markOutcome('Discharged')" class="border p-2 rounded-xl text-gray-700 hover:bg-gray-50">Discharged</button>
                </div>
            </div>
        </div>
    </main>
<script>
    // CONFIGURATION KEYS
    const CONFIG = {
        BIN_ID: "YOUR_BIN_ID_HERE",
        MASTER_KEY: "YOUR_MASTER_KEY_HERE"
    };

    // ── USSD FLOW DATA ─────────────────────────────────────────────────
    const flowData = {
        LANG: {
            text: "SamaCare v1.0\n*929#\n\nWelcome! Choose language:\n\n1. English\n2. Twi\n3. Hausa\n4. Ga\n5. Ewe",
            options: [
                {t:"1. English", v:"English"},
                {t:"2. Twi",     v:"Twi"},
                {t:"3. Hausa",   v:"Hausa"},
                {t:"4. Ga",      v:"Ga"},
                {t:"5. Ewe",     v:"Ewe"}
            ]
        },
        TRIAGE: {
            text: "SamaCare v1.0\n\nGood morning, Abena!\nHow are you feeling today?\n\n1. Fine, no issues\n2. I have some pain\n3. I feel dizzy\n4. I am bleeding\n5. Baby not moving",
            options: [
                {t:"1. Fine, no issues",   n:"FINE",             a:"Normal"},
                {t:"2. I have some pain",  n:"CRITICAL_PAIN",    a:"ALERT_PAIN"},
                {t:"3. I feel dizzy",       n:"CRITICAL_DIZZY",   a:"ALERT_DIZZY"},
                {t:"4. I am bleeding",      n:"CRITICAL_BLEED",   a:"ALERT_BLEED"},
                {t:"5. Baby not moving",    n:"CRITICAL_MOVEMENT",a:"ALERT_MOVEMENT"}
            ]
        },
        FINE: {
            text: "Thank you for updating\nSamaCare.\n\nYour routine check-in has\nbeen logged successfully.\n\n0. Back to main menu",
            options: [{t:"0. Back", n:"TRIAGE", a:"Normal"}]
        },
        CRITICAL_PAIN: {
            text: "⚠️ CRITICAL ALERT\n\nSevere pain detected.\n\nDoctor notified NOW.\nGo to hospital IMMEDIATELY.\n\nDo not wait.",
            options: []
        },
        CRITICAL_DIZZY: {
            text: "⚠️ CRITICAL ALERT\n\nSevere dizziness detected.\n\nDoctor notified NOW.\nGo to hospital IMMEDIATELY.\n\nDo not wait.",
            options: []
        },
        CRITICAL_BLEED: {
            text: "⚠️ CRITICAL ALERT\n\nBleeding detected.\n\nDoctor notified NOW.\nGo to hospital IMMEDIATELY.\n\nDo not wait.",
            options: []
        },
        CRITICAL_MOVEMENT: {
            text: "⚠️ CRITICAL ALERT\n\nReduced baby movement.\n\nDoctor notified NOW.\nGo to hospital IMMEDIATELY.\n\nDo not wait.",
            options: []
        },
        ESCALATED: {
            text: "🚨 CASE ESCALATED\n\nEmergency care services and\nregional healthcare teams\nhave been patched into this\nsession.\n\nClinician is responding.",
            options: []
        }
    };

    // ── CLOUD STATE ────────────────────────────────────────────────────
    function updateCloudState(newState) {
        if (CONFIG.BIN_ID === "YOUR_BIN_ID_HERE") {
            renderSimulator(newState.step, newState.lang);
            renderDashboard(newState.step, newState.lang, newState.alert);
            return;
        }
        fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                'X-Master-Key': CONFIG.MASTER_KEY
            },
            body: JSON.stringify(newState)
        }).catch(() => console.log("Cloud buffer — running locally"));
    }

    function startLiveSync() {
        // Safe clock update
        setInterval(() => {
            const t = new Date();
            const timeEl = document.getElementById('phone-time');
            if (timeEl) {
                timeEl.textContent = t.toLocaleTimeString('en-US', {hour:'2-digit',minute:'2-digit'});
            }
        }, 1000);

        if (CONFIG.BIN_ID === "YOUR_BIN_ID_HERE") {
            // Safe Offline Mode Boot
            renderSimulator('LANG', '');
            renderDashboard('LANG', '', 'Normal');
            
            const syncLabel = document.getElementById('sync-label');
            if (syncLabel) syncLabel.textContent = 'Offline Mode';
            
            const syncDot = document.getElementById('sync-dot');
            if (syncDot && syncDot.classList.contains('bg-green-400')) {
                syncDot.classList.replace('bg-green-400', 'bg-yellow-400');
            }
            return;
        }

        // Live sync connection loop
        setInterval(() => {
            fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`, {
                headers: { 'X-Master-Key': CONFIG.MASTER_KEY }
            })
            .then(r => r.json())
            .then(d => {
                const data = d.record;
                if (data && data.step) {
                    renderSimulator(data.step, data.lang);
                    renderDashboard(data.step, data.lang, data.alert);
                }
            })
            .catch(() => {
                const syncLabel = document.getElementById('sync-label');
                if (syncLabel) syncLabel.textContent = 'Reconnecting...';
            });
        }, 1100);
    }

    // ── RENDER SIMULATOR ───────────────────────────────────────────────
    function renderSimulator(step, lang) {
        const screen  = document.getElementById('screen-text') || document.querySelector('[id*="screen"]');
        const actions = document.getElementById('action-container') || document.querySelector('[id*="action"]');
        const current = flowData[step];
        
        if (!current || !screen || !actions) return;

        const isAlert = step.startsWith('CRITICAL_') || step === 'ESCALATED';
        screen.className = isAlert
            ? 'whitespace-pre-line leading-relaxed text-red-500 font-mono'
            : 'whitespace-pre-line leading-relaxed text-gray-800 font-mono';
        
        screen.textContent = current.text;
        actions.innerHTML = '';

        current.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = "w-full bg-gray-100 text-gray-800 border border-gray-300 p-2.5 my-1 rounded-xl text-xs font-mono text-left hover:bg-gray-200 transition font-semibold";
            btn.textContent = opt.t;
            btn.onclick = () => {
                if (step === 'LANG') updateCloudState({step:'TRIAGE', lang:opt.v, alert:'Normal'});
                else updateCloudState({step:opt.n, lang:lang, alert:opt.a});
            };
            actions.appendChild(btn);
        });
    }

    // ── RENDER DASHBOARD ───────────────────────────────────────────────
    function renderDashboard(step, lang, alertState) {
        const dashLang = document.getElementById('dash-lang');
        const dashStep = document.getElementById('dash-step');
        if (dashLang) dashLang.textContent = lang || '—';
        if (dashStep) dashStep.textContent = step || '—';

        const triage  = document.getElementById('triage-box');
        const actions = document.getElementById('dashboard-actions');
        const outcome = document.getElementById('outcome-panel');
        const status  = document.getElementById('dash-status');

        if (!triage) return;

        if (alertState && alertState.startsWith('ALERT_')) {
            triage.className = "bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-xs font-bold";
            if (actions) actions.classList.remove('hidden');
            if (outcome) outcome.classList.remove('hidden');
            if (status) status.className = "bg-red-100 text-red-600 text-xs font-bold px-3 py-1 rounded-full text-center";

            const msgs = {
                ALERT_PAIN:     "🚨 CRITICAL: Patient reported Severe Pain",
                ALERT_DIZZY:    "🚨 CRITICAL: Patient reported Severe Dizziness",
                ALERT_BLEED:    "🚨 CRITICAL: Patient reported Maternal Bleeding",
                ALERT_MOVEMENT: "🚨 CRITICAL: Patient reported Reduced Baby Movement"
            };
            triage.textContent = msgs[alertState] || "🚨 CRITICAL ALERT";

        } else if (alertState === 'ESCALATED') {
            triage.className = "bg-amber-50 border border-amber-200 text-amber-800 rounded-xl p-3 text-xs font-bold";
            triage.textContent = "⚠️ ESCALATED: Auto-escalation active. Regional clinical anchors notified.";
            if (actions) actions.classList.add('hidden');
            if (outcome) outcome.classList.remove('hidden');
            if (status) status.className = "bg-amber-100 text-amber-700 text-xs font-bold px-3 py-1 rounded-full";

        } else {
            triage.className = "bg-gray-50 text-gray-500 italic rounded-xl p-3 text-xs";
            triage.textContent = step === 'LANG'
                ? "Waiting for mother to dial in..."
                : "Monitoring active patient telemetry...";
            if (actions) actions.classList.add('hidden');
            if (outcome) outcome.classList.add('hidden');
            if (status) status.className = "bg-green-50 text-green-600 text-xs font-bold px-3 py-1 rounded-full";
        }
    }

    // ── ACTIONS ────────────────────────────────────────────────────────
    function triggerReset() {
        updateCloudState({step:'LANG', lang:'', alert:'Normal'});
    }

    function triggerEscalation() {
        updateCloudState({step:'ESCALATED', lang:'Selected', alert:'ESCALATED'});
    }

    function markOutcome(outcome) {
        alert(`Outcome marked: "${outcome}"\n\nCase logged.`);
    }

    // ── BOOT ───────────────────────────────────────────────────────────
    window.onload = startLiveSync;
</script>
