<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamaCare Live Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="p-4 md:p-8 min-h-screen bg-[#FAF6F0] flex flex-col justify-between">

    <!-- HEADER -->
    <header class="max-w-6xl mx-auto w-full text-center mb-6">
        <h1 class="text-2xl font-bold text-[#6B1D2F] mb-1">SamaCare Live Engine</h1>
        <p class="text-xs text-green-600 font-semibold flex items-center justify-center gap-1">
            <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span> Free Open Cloud Sync Active (No Card Needed)
        </p>
    </header>

    <!-- INTERFACE -->
    <main class="max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-8 items-start my-auto">
        
        <!-- SIMULATOR -->
        <div class="flex justify-center items-center">
            <div class="w-72 bg-[#6B1D2F] text-[#FAF6F0] rounded-[40px] p-6 shadow-2xl border-[6px] border-gray-800 flex flex-col justify-between min-h-[480px]">
                <div class="text-[10px] opacity-75 mb-4 flex justify-between">
                    <span>SamaCare Live USSD</span>
                    <span>🔋 100%</span>
                </div>
                <div class="flex-grow flex flex-col justify-start">
                    <div class="bg-white text-gray-800 rounded-2xl p-4 text-xs shadow-inner mb-4 min-h-[160px] flex flex-col justify-between">
                        <div id="screen-text" class="whitespace-pre-line font-medium leading-relaxed">Loading live session...</div>
                    </div>
                    <div id="action-container" class="grid grid-cols-1 gap-2"></div>
                </div>
                <button onclick="triggerReset()" class="text-[11px] text-red-200 hover:text-white mt-4 font-semibold">Reset Simulation</button>
            </div>
        </div>

        <!-- DOCTOR DASHBOARD -->
        <div class="bg-white rounded-3xl p-6 shadow-xl border border-gray-100 w-full max-w-md mx-auto">
            <div class="flex justify-between items-center pb-4 border-b border-gray-100">
                <div>
                    <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider">Clinician Triage View</span>
                    <h2 class="text-xl font-bold text-gray-800">Live Case Tracking</h2>
                </div>
                <span id="dash-status" class="bg-green-50 text-green-600 text-xs font-bold px-2.5 py-1 rounded-full animate-pulse">● LIVE</span>
            </div>
            <div class="py-4 space-y-2 text-xs border-b border-gray-100">
                <div class="flex justify-between"><span class="text-gray-400">Phone</span><span class="font-semibold text-gray-700">+233 50 ••• 4144</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Language</span><span id="dash-lang" class="font-semibold text-gray-700">-</span></div>
                <div class="flex justify-between"><span class="text-gray-400">Current Step</span><span id="dash-step" class="font-semibold text-gray-700">-</span></div>
            </div>
            <div class="py-4 border-b border-gray-100">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-2">Triage Assessment</span>
                <div id="triage-box" class="bg-gray-50 rounded-xl p-3 text-xs text-gray-500 italic">No input yet...</div>
            </div>
            <div id="dashboard-actions" class="grid grid-cols-2 gap-3 pt-4 hidden">
                <button onclick="alert('Simulating direct call loop to patient...')" class="bg-red-600 text-white font-bold text-xs py-2.5 rounded-xl shadow-md">Call Now</button>
                <button onclick="triggerEscalation()" class="border border-gray-200 font-bold text-xs py-2.5 rounded-xl bg-amber-50 text-amber-700 hover:bg-amber-100">Escalate Case</button>
            </div>
        </div>
    </main>

    <script>
        // Using an open, zero-auth key storage for synchronization
        const SYNC_URL = "https://kvdb.io/MN7ZgWvT9Yv7pXWq6Zq4z8/samacare_live_session";

        const flowData = {
            LANG: {
                text: "Welcome to SamaCare.\n\nChoose language:\n1. English\n2. Twi\n3. Hausa",
                options: [{t:"1. English", v:"English"}, {t:"2. Twi", v:"Twi"}, {t:"3. Hausa", v:"Hausa"}]
            },
            MENU: {
                text: "SamaCare Main Menu\n\n1. ANC Check-in\n2. Report a Symptom\n3. Exit",
                options: [{t:"1. ANC Check-in", n:"ANC"}, {t:"2. Report a Symptom", n:"SYMPTOMS"}, {t:"3. Exit", n:"LANG"}]
            },
            ANC: {
                text: "Antenatal Care Dashboard\n\nYour next scheduled clinical check-in is pending.\n\n1. Log weekly updates\n0. Back",
                options: [{t:"1. Log weekly updates", n:"LOG_WEEK"}, {t:"0. Back", n:"MENU"}]
            },
            LOG_WEEK: {
                text: "Weekly ANC Update:\n\nAre you taking your prescribed supplements daily?\n1. Yes\n2. No",
                options: [{t:"1. Yes", n:"SUCCESS"}, {t:"2. No", n:"SUCCESS"}]
            },
            SUCCESS: {
                text: "Thank you.\nYour records have been uploaded successfully to the clinic server.\n\n0. Exit",
                options: [{t:"0. Exit", n:"LANG"}]
            },
            SYMPTOMS: {
                text: "Select triage symptom:\n1. Headache/Fever\n2. Reduced baby movement",
                options: [{t:"1. Headache/Fever", n:"SUCCESS"}, {t:"2. Reduced baby movement", n:"CRITICAL"}]
            },
            CRITICAL: {
                text: "⚠️ CRITICAL ALERT\n\nDoctor notified NOW.\nGo to hospital IMMEDIATELY.",
                options: []
            },
            ESCALATED: {
                text: "🚨 CASE ESCALATED BY CLINICIAN\n\nEmergency services and local regional head nurses have been dispatched.",
                options: []
            }
        };

        function updateCloudState(newState) {
            fetch(SYNC_URL, {
                method: 'POST',
                body: JSON.stringify(newState)
            }).catch(err => console.log("Sync delay..."));
        }

        function startLiveSync() {
            // Check state every 900ms
            setInterval(() => {
                fetch(SYNC_URL)
                .then(res => res.json())
                .then(data => {
                    if (data && data.step) {
                        renderSimulator(data.step, data.lang);
                        renderDashboard(data.step, data.lang, data.alert);
                    } else {
                        triggerReset();
                    }
                })
                .catch(() => {
                    // Initialize if empty
                    triggerReset();
                });
            }, 900);
        }

        function renderSimulator(step, lang) {
            const screen = document.getElementById('screen-text');
            const actions = document.getElementById('action-container');
            const current = flowData[step];
            
            screen.innerHTML = current.text;
            actions.innerHTML = '';
            
            current.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "bg-white text-[#6B1D2F] border p-2 rounded-xl text-xs font-semibold text-left active:scale-95 transition";
                btn.innerText = opt.t;
                btn.onclick = () => {
                    if(step === 'LANG') updateCloudState({step: 'MENU', lang: opt.v, alert: 'Normal'});
                    else if(opt.n === 'CRITICAL') updateCloudState({step: 'CRITICAL', lang: lang, alert: 'CRITICAL_ALERT'});
                    else updateCloudState({step: opt.n, lang: lang, alert: 'Normal'});
                };
                actions.appendChild(btn);
            });
        }

        function renderDashboard(step, lang, alertState) {
            document.getElementById('dash-lang').innerText = lang || "Not selected";
            document.getElementById('dash-step').innerText = step;
            
            const triage = document.getElementById('triage-box');
            const actions = document.getElementById('dashboard-actions');
            const status = document.getElementById('dash-status');

            if (alertState === 'CRITICAL_ALERT') {
                triage.className = "bg-red-50 border border-red-200 text-red-700 rounded-xl p-3 text-xs font-bold animate-pulse";
                triage.innerHTML = "🚨 CRITICAL: Patient reported Reduced Baby Movement!";
                actions.classList.remove('hidden');
                status.className = "bg-red-100 text-red-600 text-xs font-bold px-2.5 py-1 rounded-full animate-bounce";
            } else if (alertState === 'ESCALATED') {
                triage.className = "bg-amber-100 border border-amber-300 text-amber-800 rounded-xl p-3 text-xs font-bold";
                triage.innerHTML = "⚠️ ESCALATED: Emergency services alerted via dashboard trigger overrides.";
                actions.classList.add('hidden');
            } else {
                triage.className = "bg-gray-50 text-gray-500 italic rounded-xl p-3 text-xs";
                triage.innerHTML = step === 'LANG' ? "Waiting for patient input..." : "Monitoring active patient telemetry...";
                actions.classList.add('hidden');
                status.className = "bg-green-50 text-green-600 text-xs font-bold px-2.5 py-1 rounded-full animate-pulse";
            }
        }

        function triggerReset() {
            updateCloudState({step: 'LANG', lang: '', alert: 'Normal'});
        }

        function triggerEscalation() {
            fetch(SYNC_URL)
            .then(res => res.json())
            .then(data => {
                updateCloudState({step: 'ESCALATED', lang: data.lang, alert: 'ESCALATED'});
            });
        }

        window.onload = startLiveSync;
    </script>
</body>
</html>
